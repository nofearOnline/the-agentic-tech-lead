      RS256/HS256 swap).
    match_keywords:
      - algorithm
      - alg
      - none
      - confusion
      - HS256
      - RS256
      - pin

  - id: pr3-security-predictable-reset-token
    category: security
    severity: must
    file: payments-service/src/auth/jwt.ts
    line_range: [27, 29]
    description: >
      `generateResetToken` is `userId + '-' + Math.random() + '-' +
