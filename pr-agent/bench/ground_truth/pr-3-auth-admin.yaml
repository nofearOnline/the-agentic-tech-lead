  - id: pr3-security-eval-in-where-clause
    category: security
    severity: must
    file: payments-service/src/auth/userStore.ts
    line_range: [50, 65]
    description: >
      `evalWhere` builds a JS expression from a SQL WHERE clause and runs
      it through `eval()`. Arbitrary code execution masquerading as a
      query planner.
    match_keywords:
      - eval
      - arbitrary code
      - RCE
      - injection
      - code execution

  - id: pr3-security-sql-injection-insert
    category: security
    severity: must
    file: payments-service/src/auth/userStore.ts
    line_range: [73, 78]
    description: >
      `createUser` builds an INSERT via template-string interpolation of
      `email`, `passwordHash`, `role`. A user-supplied email containing a
      quote escapes the statement (and via `eval`, escapes everything).
    match_keywords:
      - injection
      - SQL injection
      - sanitize
      - parameterized
      - prepared
      - template
      - interpolation

  - id: pr3-structure-authcontroller-no-di
    category: quality
    severity: should
    file: payments-service/src/http/controllers/authController.ts
    line_range: [2, 7]
    description: >
      `AuthController` has no constructor and no injected dependencies - it
      reaches directly into module-level functions imported from `userStore`,
      `passwordHash`, and `jwt`, and embeds the auth orchestration (lookup,
      hashing, token signing) inline in the HTTP handlers. This ignores the
      project's structure: every other controller is constructed with an
      injected service and wired in `app.ts` (`PaymentsController(payments)`,
      `AdminController(adminService)`, `CustomerHistoryController(repo,
      refunds)`), keeping controllers thin and logic testable behind a service
      seam. Auth should live in an injected `AuthService`, not be hand-wired
      through direct module imports. A diff-only reviewer can't see that the
      other controllers follow a DI/service structure.
    match_keywords:
      - dependency injection
      - DI
      - AuthService
      - service
      - inject
      - constructor
      - architecture
      - structure
      - app.ts
      - inconsistent
      - convention
      - pattern
      - thin controller
      - module functions
      - wiring

  - id: pr3-security-listusers-arbitrary-filter
    category: security
    severity: must
    file: payments-service/src/auth/userStore.ts
    line_range: [88, 94]
    description: >
      `listAllUsers(filter)` passes a caller-supplied filter string
      directly into the WHERE clause (which is then `eval()`-ed). Admin
      endpoint, but combined with the bypass flag, anyone can run code.
    match_keywords:
      - filter
      - injection
      - eval
      - arbitrary
      - WHERE
      - listAllUsers

