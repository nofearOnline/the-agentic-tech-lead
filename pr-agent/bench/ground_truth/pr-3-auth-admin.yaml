      - authorization
      - RBAC

  - id: pr3-security-timing-unsafe-apikey
    category: security
    severity: should
    file: payments-service/src/auth/authMiddleware.ts
    line_range: [15, 19]
    description: >
      The `x-admin-key` shortcut compares the caller-supplied key to
      `process.env.ADMIN_API_KEY` with `===`, a non-constant-time compare
      that leaks the key byte-by-byte via a timing side-channel. Secret
      comparison must use `crypto.timingSafeEqual` (the codebase already
      imports it in passwordHash.ts).
    match_keywords:
      - timing
      - constant-time
      - constant time
      - timingSafeEqual
      - side-channel
      - side channel
      - secret comparison
      - "==="

