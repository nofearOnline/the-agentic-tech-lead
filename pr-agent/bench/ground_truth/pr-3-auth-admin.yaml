    match_keywords:
      - hardcoded
      - hard-coded
      - fallback
      - default secret
      - dev-secret
      - JWT_SECRET
      - throw

  - id: pr3-security-jwt-no-algorithm-pin
    category: security
    severity: should
    file: payments-service/src/auth/jwt.ts
    line_range: [12, 14]
    description: >
      `jwt.sign(payload, SECRET)` without `algorithm` and `jwt.verify`
