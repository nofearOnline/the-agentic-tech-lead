    match_keywords:
      - duplicate
      - duplicated
      - DRY
      - middleware
      - requireAdmin
      - copy
      - repeat

  # ---- webhooks SSRF ----
  - id: pr3-security-webhook-ssrf
    category: security
    severity: must
    file: payments-service/src/services/webhooksService.ts
    line_range: [35, 47]
    description: >
      Webhook delivery does `fetch(hook.url)` to a user-supplied URL with
      `redirect: 'follow'` and no allowlist. Classic SSRF -
      `http://169.254.169.254/...` reachable from the pod.
    match_keywords:
      - SSRF
      - server-side request forgery
      - allowlist
      - metadata
      - 169.254
      - internal
      - localhost
      - redirect

  - id: pr3-quality-webhook-floating-promise
    category: quality
    severity: should
    file: payments-service/src/services/paymentsService.ts
    line_range: [65, 68]
    description: >
      `this.webhooks.fireForTransaction(transaction)` is invoked without
      `await` and without a `.catch`. It's a floating promise: any rejection
      becomes an unhandled promise rejection and every delivery failure is
      silently swallowed. Either await it off the request path or hand it to
      a queue with explicit error handling.
    match_keywords:
      - floating promise
      - unhandled
      - await
      - .catch
      - fire-and-forget
      - unhandled rejection
      - not awaited
      - swallow
      - void

  - id: pr3-quality-webhook-fire-no-auth
    category: security
    severity: must
    file: payments-service/src/services/webhooksService.ts
    line_range: [29, 33]
    description: >
      Webhook payload includes the FULL transaction object, including
      `card_number` and `cvc` (added in this PR). Card data POSTed to
      arbitrary URLs.
    match_keywords:
      - card_number
      - cvc
      - PAN
      - PII
      - PCI
      - payload
      - leak
      - secret

  - id: pr3-security-webhook-no-hmac
    category: security
    severity: should
    file: payments-service/src/services/webhooksService.ts
    line_range: [35, 46]
    description: >
      Outgoing webhooks are POSTed with a `content-type` and an
      `x-webhook-id` header but no HMAC signature over the body. Receivers
      can't verify the payload came from us, so anyone who learns a
      subscriber URL can forge `transaction.created` events. Sign the body
      (e.g. `X-Signature: sha256=HMAC(secret, body)`).
    match_keywords:
      - HMAC
      - signature
      - sign
      - unsigned
      - verify
      - authenticity
      - X-Signature
      - shared secret

  - id: pr3-perf-webhook-sequential-await
    category: performance
    severity: should
    file: payments-service/src/services/webhooksService.ts
    line_range: [35, 47]
    description: >
      `for (const hook of webhooks) { await fetch(...) }` delivers webhooks
      strictly one at a time. With N subscribers, total latency is the sum
      of every endpoint's latency and one slow/hanging endpoint blocks all
      the rest. Fan out with `Promise.all` / `Promise.allSettled` (with a
      timeout).
    match_keywords:
      - sequential
      - await in loop
      - await in a loop
      - Promise.all
      - allSettled
      - parallel
      - serial
      - one at a time
      - blocking
      - fan-out

