# Shared configuration for every version of the PR-review agent and for
# the eval harness. Edit this file to swap models, change pricing, or
# tune eval behavior. Nothing in pr-agent/v*/ should hardcode a model
# name or a price; everything reads from here.

# Which LLM backend the shared `call()` uses.
#   auto -> sdk when ANTHROPIC_API_KEY is set (incl. pr-agent/.env), else cli
#   sdk  -> Anthropic Python SDK (api key required)
#   cli  -> `claude` CLI subprocess
# Override at runtime with the PR_AGENT_BACKEND env var.
backend: auto

repo:
  # Target repo whose PRs we review. The agent fetches diffs via `gh pr diff`
  # against this slug. Worktree-based versions (v2+) will clone here.
  owner: nofearOnline
  name: the-agentic-tech-lead

models:
  # Logical role -> model alias. The `claude` CLI resolves short aliases
  # ("haiku", "sonnet", "opus") to the current dated snapshot at call
  # time and reports the resolved ID in the response envelope. For SDK
  # use later, swap to dated snapshots like "claude-sonnet-4-5-20250929".
  generalist: sonnet              # v1, v2 reviewer
  scout: sonnet                   # v4 scout (agentic loop)
  specialist_reasoning: sonnet    # v3/v4 specialists needing judgment (architecture, safety)
  specialist_narrow: haiku        # v3/v4 specialists for narrow lenses (conventions, tests, design system)
  tier1: haiku                    # v5 Tier 1 mechanical findings
  skeptic: opus                   # v4/v5 final filter pass (blog: "let the smartest agent prune")

# Concrete Anthropic API model IDs for the SDK backend, keyed by the aliases
# above. "auto" resolves to the newest snapshot in that family via the models
# API at first use (cached). Pin to a dated snapshot for reproducibility, e.g.
# sonnet: claude-sonnet-4-5-20250929
model_ids:
  haiku: auto
  sonnet: auto
  opus: auto

eval:
  trials_per_pr: 3
  max_cost_per_run_usd: 5.0     # bail if a single review run exceeds this
  output_dir: bench/results     # relative to pr-agent/
  prs:                           # which PR numbers to evaluate against
    - 1
    - 2
    - 3

# USD per 1M tokens. Only used by the SDK backend (when an API key is
# present). The `claude` CLI backend reports total_cost_usd per call
# directly, so this table is ignored for that path.
# Source of truth: https://www.anthropic.com/pricing
pricing:
  sonnet:
    input: 3.00
    input_cache_write: 3.75
    input_cache_read: 0.30
    output: 15.00
  haiku:
    input: 1.00
    input_cache_write: 1.25
    input_cache_read: 0.10
    output: 5.00
  opus:
    input: 15.00
    input_cache_write: 18.75
    input_cache_read: 1.50
    output: 75.00
